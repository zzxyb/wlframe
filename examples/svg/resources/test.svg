<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     viewBox="0 0 200 200" width="200" height="200">

  <defs>
    <!-- Symbol: a small cross icon -->
    <symbol id="icon-cross" viewBox="0 0 10 10">
      <line x1="5" y1="0" x2="5" y2="10" stroke="#333" stroke-width="2"/>
      <line x1="0" y1="5" x2="10" y2="5" stroke="#333" stroke-width="2"/>
    </symbol>
  </defs>

  <!-- Background rectangle -->
  <rect id="bg" x="0" y="0" width="200" height="200" fill="#f0f4f8"/>
  <!-- Coloured rectangle with stroke -->
  <rect id="card" x="20" y="20" width="160" height="100" rx="8" ry="8"
        fill="#4a90d9" stroke="#1a5fa8" stroke-width="3"/>
  <!-- Circle overlay -->
  <circle id="dot" cx="100" cy="70" r="40" fill="#e74c3c" opacity="0.75"/>
  <!-- Diagonal line -->
  <line id="divider" x1="20" y1="140" x2="180" y2="140" stroke="#2ecc71" stroke-width="2"/>
  <!-- Simple triangle path -->
  <path id="arrow" d="M 100 150 L 60 190 L 140 190 Z"
        fill="#f39c12" stroke="#c0392b" stroke-width="2"/>
    <!-- Text label -->
    <text id="title" x="100" y="28" font-family="sans-serif" font-size="16"
      fill="#1f2d3d" text-anchor="middle">wlframe svg text</text>
  <!-- Reuse the cross symbol at two positions -->
  <use id="cross-a" href="#icon-cross" x="10" y="160"/>
  <use id="cross-b" href="#icon-cross" x="170" y="160"/>
</svg>
